<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simulador - Rastreo SPEI (Simulación)</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Ajustes específicos para el simulador */
    .sim-container { padding: 20px; }
    .sim-form { max-width: 720px; margin-bottom: 20px; }
    .sim-preview { background:#fff; padding:16px; border-radius:8px; box-shadow:0 6px 20px rgba(0,0,0,0.08); }
    .watermark { position: absolute; left:50%; top:50%; transform:translate(-50%,-50%) rotate(-25deg); font-size:48px; color:rgba(200,0,0,0.12); pointer-events:none; }
    .placeholder-logo { width:120px; height:40px; background:#eee; display:inline-block; border-radius:6px; text-align:center; line-height:40px; color:#999; font-weight:600; }
    .fixed-block { background:#f7f7f7; padding:12px; border-radius:6px; margin-bottom:12px; }
    .label-small { font-size:12px; color:#666; }
    .btn-row { display:flex; gap:10px; }
    @media (max-width:768px) { .sim-form, .sim-preview { width:100%; } }
  </style>
</head>
<body>
  <div class="container sim-container">
    <header>
      <h1>Simulador educativo - Rastreo SPEI (SIMULACIÓN)</h1>
      <p class="label-small">Documento marcado como SIMULACIÓN — NO VÁLIDO. No reproduzca sellos oficiales.</p>
    </header>

    <main>
      <section class="sim-form">
        <h2>Datos (variables)</h2>
        <div class="form-group">
          <label>Clave de rastreo SPEI</label>
          <input id="clave" class="form-control" type="text" value="08590190520261217501234">
        </div>
        <div class="form-group">
          <label>Fecha y hora de operación</label>
          <input id="fecha_op" class="form-control" type="datetime-local" value="2026-05-19T10:23:15">
        </div>
        <div class="form-group">
          <label>Monto (MXN)</label>
          <input id="monto" class="form-control" type="number" step="0.01" value="121750.00">
        </div>
        <div class="form-group">
          <label>Banco ordenante</label>
          <input id="banco_or" class="form-control" type="text" value="Scotiabank">
        </div>
        <div class="form-group">
          <label>Banco beneficiario</label>
          <input id="banco_ben" class="form-control" type="text" value="Banco Azteca">
        </div>
        <div class="form-group">
          <label>Cuenta beneficiaria (oculta)</label>
          <input id="cuenta_ben" class="form-control" type="text" value="***************6920">
        </div>
        <div class="form-group">
          <label>Concepto</label>
          <input id="concepto" class="form-control" type="text" value="Pago de servicios">
        </div>
        <div class="form-group">
          <label>Estatus (texto largo)</label>
          <textarea id="estatus_text" class="form-control" rows="4">EN CÁMARA DE COMPENSACIÓN DE HACIENDA\nIntervención de Autoridad Fiscal\nLa transferencia se encuentra en la Cámara de Compensación Fiscal del SAT para revisión.</textarea>
        </div>
        <div class="form-group btn-row">
          <button class="btn-generate" onclick="renderPreview()">Actualizar vista previa</button>
          <button class="btn-download" onclick="downloadPreview()">⬇️ Descargar imagen</button>
          <button class="btn-print" onclick="printPreview()">🖨️ Imprimir</button>
        </div>
      </section>

      <section class="sim-preview" id="preview-root" style="position:relative; max-width:820px;">
        <div class="watermark">SIMULACIÓN - NO VÁLIDO</div>
        <!-- Vista previa generada por JS -->
        <div id="preview-content"></div>
      </section>
    </main>

    <footer style="margin-top:18px;">
      <p class="label-small">Nota: Este documento es una simulación educativa. No contiene sellos oficiales ni firmas digitales.</p>
    </footer>
  </div>

  <script src="spei_simulator.js"></script>
</body>
</html>
